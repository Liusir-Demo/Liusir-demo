<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>蒙牛好礼 幸运抽奖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #e8f8e0 0%, #c8e8c0 30%, #a8d8a0 60%, #8bc78b 100%);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    overflow-x: hidden;
  }

  /* 背景装饰 - 云朵 */
  .bg-cloud {
    position: fixed;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .bg-cloud::before, .bg-cloud::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .bg-cloud.c1 { width: 120px; height: 50px; top: 8%; left: 5%; }
  .bg-cloud.c1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
  .bg-cloud.c1::after  { width: 70px; height: 40px; top: -15px; left: 50px; }
  .bg-cloud.c2 { width: 100px; height: 40px; top: 12%; right: 8%; }
  .bg-cloud.c2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
  .bg-cloud.c2::after  { width: 55px; height: 35px; top: -12px; left: 40px; }

  /* 草地纹理 */
  .grass {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, rgba(100,180,80,0.4) 0%, rgba(80,160,60,0.6) 50%, rgba(60,140,40,0.8) 100%);
    pointer-events: none;
    z-index: 0;
    border-radius: 60% 70% 0 0 / 30px 30px 0 0;
  }

  /* 奶牛斑点装饰 */
  .cow-spot {
    position: fixed;
    background: rgba(255,255,255,0.35);
    border-radius: 45% 55% 50% 50%;
    pointer-events: none;
    z-index: 0;
  }
  .cow-spot.s1 { width: 80px; height: 55px; bottom: 15%; left: 8%; }
  .cow-spot.s2 { width: 60px; height: 70px; bottom: 10%; right: 6%; }
  .cow-spot.s3 { width: 40px; height: 35px; bottom: 20%; left: 25%; }

  .container {
    text-align: center;
    padding: 20px;
    position: relative;
    z-index: 10;
  }

  /* 品牌头部 */
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .brand-logo {
    width: 44px;
    height: 44px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .brand-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    letter-spacing: 1px;
  }

  .title {
    font-size: 30px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.12);
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 22px;
    letter-spacing: 1px;
  }

  .remain {
    display: inline-block;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 20px;
    padding: 6px 20px;
    color: #2e7d32;
    font-size: 13px;
    margin-bottom: 18px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .remain span { font-weight: 800; font-size: 18px; color: #00A850; }

  /* 九宫格 */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    width: 330px;
    height: 330px;
    margin: 0 auto 20px;
  }

  .cell {
    background: rgba(255, 255, 255, 0.92);
    border: 2px solid rgba(0, 168, 80, 0.15);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,168,80,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .cell .icon {
    font-size: 32px;
    margin-bottom: 2px;
    transition: transform 0.3s ease;
    position: relative;
    z-index: 1;
  }

  .cell .name {
    font-size: 12px;
    color: #33691e;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  .cell.active {
    border-color: #00A850;
    background: #00A850;
    box-shadow: 0 0 20px rgba(0, 168, 80, 0.4), inset 0 0 20px rgba(255,255,255,0.15);
  }
  .cell.active .icon { transform: scale(1.15); }
  .cell.active .name { color: #fff; }

  /* 中间抽奖按钮 */
  .cell.center {
    background: linear-gradient(145deg, #00A850, #008840);
    border: none;
    cursor: pointer;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    box-shadow: 0 4px 16px rgba(0, 168, 80, 0.45);
    transition: all 0.2s ease;
    gap: 2px;
  }
  .cell.center::before { display: none; }
  .cell.center:hover {
    transform: scale(1.03);
    box-shadow: 0 6px 24px rgba(0, 168, 80, 0.6);
  }
  .cell.center:active { transform: scale(0.97); }

  .cell.center.disabled {
    background: #b0b0b0;
    cursor: not-allowed;
    box-shadow: none;
    pointer-events: none;
  }
  .cell.center.disabled:hover { transform: none; }

  .cell.center .icon { font-size: 22px; }
  .cell.center .name { font-size: 16px; color: #fff; }

  /* 弹窗基础 */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.2s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-160px) rotate(720deg); opacity: 0; } }

  .popup {
    background: #fff;
    border-radius: 20px;
    padding: 30px 28px 24px;
    text-align: center;
    min-width: 290px;
    max-width: 340px;
    width: 90%;
    animation: popIn 0.3s ease;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    position: relative;
    overflow: hidden;
  }

  /* 头顶绿色装饰条 */
  .popup::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #00A850, #4CAF50, #00A850);
  }

  .popup .prize-icon { font-size: 52px; animation: float 1.5s ease infinite; }
  .popup .prize-name { font-size: 20px; color: #00A850; font-weight: 700; margin: 10px 0 4px; }
  .popup .prize-desc { font-size: 13px; color: #888; margin-bottom: 16px; }

  .popup button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00A850, #008840);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .popup button:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(0, 168, 80, 0.4); }
  .popup button:active { transform: scale(0.98); }
  .popup button.btn-ghost {
    background: #fff;
    color: #00A850;
    border: 1.5px solid #00A850;
    margin-top: 8px;
  }

  /* ===== 收货地址表单 ===== */
  .ship-form {
    text-align: left;
    margin-bottom: 12px;
  }
  .ship-form .form-title {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 1px;
  }
  .ship-form .field {
    margin-bottom: 10px;
  }
  .ship-form label {
    display: block;
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .ship-form input,
  .ship-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
    resize: none;
  }
  .ship-form input:focus,
  .ship-form textarea:focus {
    border-color: #00A850;
    background: #fff;
  }
  .ship-form textarea {
    height: 60px;
  }
  .ship-form .error {
    font-size: 11px;
    color: #e53935;
    margin-top: 2px;
    display: none;
  }
  .ship-form .field.invalid input,
  .ship-form .field.invalid textarea {
    border-color: #e53935;
    background: #fff5f5;
  }
  .ship-form .field.invalid .error {
    display: block;
  }
  .submit-success {
    text-align: center;
    padding: 20px 0;
  }
  .submit-success .check {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #E8F5E9;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 28px;
  }
  .submit-success p { font-size: 14px; color: #666; }

  /* 抽奖记录 */
  .records {
    margin-top: 20px;
    color: rgba(255, 255, 255, 0.8);
    font-size: 12px;
    max-width: 330px;
    text-align: left;
  }
  .records h4 {
    color: rgba(255, 255, 255, 0.9);
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .record-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  }
  .record-item .time { color: rgba(255, 255, 255, 0.55); }
  .record-item .rprize { color: #fff; font-weight: 500; }

  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 200;
  }
</style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-cloud c1"></div>
<div class="bg-cloud c2"></div>
<div class="cow-spot s1"></div>
<div class="cow-spot s2"></div>
<div class="cow-spot s3"></div>
<div class="grass"></div>

<div class="container">
  <div class="brand">
    <div class="brand-logo">🐄</div>
    <span class="brand-name">蒙 牛</span>
  </div>
  <div class="title">好礼转转转</div>
  <div class="subtitle">每日抽奖 · 惊喜不停</div>

  <div class="remain">剩余抽奖次数 <span id="remainCount">5</span></div>

  <div class="grid" id="grid"></div>

  <div class="records" id="records">
    <h4>📋 抽奖记录</h4>
    <div id="recordList"><span style="color:rgba(255,255,255,0.45)">暂无记录</span></div>
  </div>
</div>

<script>
// ==================== 奖品配置 ====================
// type: 'physical' = 实物需填写地址，'virtual' = 虚拟奖品无需地址
const prizes = [
  { id: 0, icon: '🧧', name: '88元红包',   desc: '可直接提现至微信零钱',  weight: 2,  type: 'virtual' },
  { id: 1, icon: '📱', name: '蒙牛定制手机', desc: '蒙牛限定版智能手机一部', weight: 0.3, type: 'physical' },
  { id: 2, icon: '🎧', name: '蓝牙耳机',    desc: '蒙牛联名款无线耳机',    weight: 1,  type: 'physical' },
  { id: 3, icon: '🎟️', name: '5元优惠券',   desc: '蒙牛商城通用优惠券',     weight: 10, type: 'virtual' },
  { id: 4, icon: '🥛', name: '蒙牛纯牛奶',  desc: '特仑苏纯牛奶一提(12盒)', weight: 2,  type: 'physical' },
  { id: 5, icon: '🧸', name: '蒙牛公仔',    desc: '蒙小牛限定版毛绒公仔',    weight: 1,  type: 'physical' },
  { id: 6, icon: '🎫', name: '3元优惠券',   desc: '蒙牛商城通用优惠券',     weight: 12, type: 'virtual' },
  { id: 7, icon: '🌱', name: '谢谢参与',    desc: '下次好运，再试试吧',    weight: 15, type: 'virtual' },
  { id: 8, icon: '🥤', name: '酸酸乳一箱',  desc: '蒙牛酸酸乳原味一箱',     weight: 2.5, type: 'physical' },
];

// ==================== 本地存储 ====================
const STORAGE_KEY = 'mengniu_lottery';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { remain: 5, records: [], shipments: [] };
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let state = loadData();
let spinning = false;
let activeIndex = -1;
let timer = null;

// ==================== 渲染 ====================
const grid = document.getElementById('grid');
const remainEl = document.getElementById('remainCount');
const recordList = document.getElementById('recordList');

function buildGrid() {
  grid.innerHTML = '';
  prizes.forEach((p, i) => {
    const cell = document.createElement('div');
    if (i === 4) {
      cell.className = 'cell center' + (spinning || state.remain === 0 ? ' disabled' : '');
      cell.innerHTML = '<span class="icon">🎁</span><span class="name">抽 奖</span>';
      cell.addEventListener('click', startLottery);
      cell.style.order = 4;
      cell.dataset.index = 'center';
    } else {
      cell.className = 'cell';
      cell.innerHTML = `<span class="icon">${p.icon}</span><span class="name">${p.name}</span>`;
      const pos = i <= 3 ? i : i + 1;
      cell.style.order = pos >= 4 ? pos + 1 : pos;
      cell.dataset.index = i;
    }
    grid.appendChild(cell);
  });
}

function updateRemain() {
  remainEl.textContent = state.remain;
  const btn = grid.querySelector('.cell.center');
  if (state.remain === 0 || spinning) {
    btn.classList.add('disabled');
  } else {
    btn.classList.remove('disabled');
  }
}

function updateRecords() {
  if (state.records.length === 0) {
    recordList.innerHTML = '<span style="color:rgba(255,255,255,0.45)">暂无记录</span>';
    return;
  }
  recordList.innerHTML = state.records
    .map(r => `<div class="record-item"><span class="time">${r.time}</span><span class="rprize">${r.name}</span></div>`)
    .join('');
}

// ==================== 抽奖算法 ====================
function weightedRandom() {
  const total = prizes.reduce((s, p) => s + p.weight, 0);
  let rand = Math.random() * total;
  for (let i = 0; i < prizes.length; i++) {
    rand -= prizes[i].weight;
    if (rand <= 0) return i;
  }
  return prizes.length - 1;
}

// ==================== 动画 ====================
function setActive(cellIndex) {
  const prev = grid.querySelector('.cell.active');
  if (prev) prev.classList.remove('active');
  const cells = grid.querySelectorAll('.cell:not(.center)');
  for (const c of cells) {
    if (parseInt(c.dataset.index) === cellIndex) {
      c.classList.add('active');
      break;
    }
  }
  activeIndex = cellIndex;
}

const ringOrder = [0, 1, 2, 5, 8, 7, 6, 3];

function runAnimation(finalIndex, callback) {
  let currentRingPos = ringOrder.indexOf(activeIndex);
  if (currentRingPos === -1) currentRingPos = 0;
  const finalRingPos = ringOrder.indexOf(finalIndex);
  const totalSteps = (3 * 8) + ((finalRingPos - currentRingPos + 8) % 8);
  let currentStep = 0;

  function tick() {
    if (currentStep >= totalSteps) {
      setActive(finalIndex);
      setTimeout(callback, 300);
      return;
    }
    const ringPos = (currentRingPos + 1 + currentStep) % 8;
    setActive(ringOrder[ringPos]);
    const progress = currentStep / totalSteps;
    currentStep++;
    timer = setTimeout(tick, 60 + progress * 280);
  }
  timer = setTimeout(tick, 80);
}

// ==================== 主流程 ====================
function startLottery() {
  if (spinning || state.remain <= 0) return;

  spinning = true;
  state.remain--;
  saveData(state);
  updateRemain();

  const finalIndex = weightedRandom();
  const prize = prizes[finalIndex];

  runAnimation(finalIndex, () => {
    spinning = false;
    updateRemain();

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    state.records.unshift({ time: timeStr, name: prize.name });
    saveData(state);
    updateRecords();

    showResult(prize);
  });
}

// ==================== 结果显示 ====================
function showResult(prize) {
  const isWin = prize.name !== '谢谢参与';
  const overlay = document.createElement('div');
  overlay.className = 'overlay';

  if (isWin && prize.type === 'physical') {
    // 实物奖品 → 显示收货地址表单
    overlay.innerHTML = `
      <div class="popup">
        <div class="prize-icon">${prize.icon}</div>
        <div class="prize-name" style="color:#00A850">🎉 恭喜获得${prize.name}</div>
        <div class="prize-desc">${prize.desc}</div>
        <div class="ship-form" id="shipForm">
          <div class="form-title">📦 填写收货信息</div>
          <div class="field">
            <label>收件人姓名</label>
            <input type="text" id="shipName" placeholder="请输入真实姓名" autocomplete="name">
            <span class="error">请输入姓名</span>
          </div>
          <div class="field">
            <label>手机号码</label>
            <input type="tel" id="shipPhone" placeholder="请输入手机号码" autocomplete="tel">
            <span class="error">请输入正确的手机号码</span>
          </div>
          <div class="field">
            <label>收货地址</label>
            <textarea id="shipAddr" placeholder="省/市/区/详细地址"></textarea>
            <span class="error">请输入完整收货地址</span>
          </div>
        </div>
        <button id="btnSubmit">提交收货信息</button>
        <button class="btn-ghost" id="btnSkip">暂不填写，继续抽奖</button>
      </div>
    `;

    document.body.appendChild(overlay);

    const nameInput = overlay.querySelector('#shipName');
    const phoneInput = overlay.querySelector('#shipPhone');
    const addrInput = overlay.querySelector('#shipAddr');

    overlay.querySelector('#btnSubmit').addEventListener('click', () => {
      if (validateAndSubmit(overlay, prize, nameInput, phoneInput, addrInput)) {
        // 成功后关闭
      }
    });

    overlay.querySelector('#btnSkip').addEventListener('click', () => {
      overlay.remove();
      if (state.remain === 0) showAllOut();
    });

  } else {
    // 虚拟奖品 / 谢谢参与 → 简单弹窗
    overlay.innerHTML = `
      <div class="popup">
        <div class="prize-icon">${prize.icon}</div>
        <div class="prize-name">${isWin ? prize.name : '😢 谢谢参与'}</div>
        <div class="prize-desc">${prize.desc}</div>
        <button>${state.remain > 0 ? '继续抽奖' : '知道了'}</button>
      </div>
    `;
    overlay.querySelector('button').addEventListener('click', () => {
      overlay.remove();
      if (state.remain === 0) showAllOut();
    });
  }

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  document.body.appendChild(overlay);
  if (isWin) spawnConfetti();
}

// ==================== 表单验证 & 提交 ====================
function validateAndSubmit(overlay, prize, nameEl, phoneEl, addrEl) {
  let valid = true;

  const nameF = nameEl.closest('.field');
  const phoneF = phoneEl.closest('.field');
  const addrF = addrEl.closest('.field');

  nameF.classList.remove('invalid');
  phoneF.classList.remove('invalid');
  addrF.classList.remove('invalid');

  const name = nameEl.value.trim();
  const phone = phoneEl.value.trim();
  const addr = addrEl.value.trim();

  if (!name) { nameF.classList.add('invalid'); valid = false; }
  if (!/^1\d{10}$/.test(phone)) { phoneF.classList.add('invalid'); valid = false; }
  if (addr.length < 5) { addrF.classList.add('invalid'); valid = false; }

  if (!valid) return false;

  // 保存收货信息
  state.shipments.push({
    prize: prize.name,
    name,
    phone,
    address: addr,
    time: new Date().toLocaleString('zh-CN')
  });
  saveData(state);

  // 显示成功
  const popup = overlay.querySelector('.popup');
  popup.innerHTML = `
    <div class="submit-success">
      <div class="check">✅</div>
      <p style="font-size:16px;font-weight:700;color:#00A850;margin-bottom:4px;">提交成功</p>
      <p>我们将在7个工作日内发货<br>请保持手机畅通</p>
    </div>
    <button>${state.remain > 0 ? '继续抽奖' : '知道了'}</button>
  `;
  popup.querySelector('button').addEventListener('click', () => {
    overlay.remove();
    if (state.remain === 0) showAllOut();
  });

  return true;
}

// ==================== 次数用完 ====================
function showAllOut() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  const winCount = state.records.filter(r => r.name !== '谢谢参与').length;
  overlay.innerHTML = `
    <div class="popup">
      <div class="prize-icon">🎉</div>
      <div class="prize-name">今日抽奖机会已用完</div>
      <div class="prize-desc">共获得 ${winCount} 个奖品，明日再来！</div>
      <button>好的</button>
    </div>
  `;
  overlay.querySelector('button').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ==================== 彩带 ====================
function spawnConfetti() {
  const colors = ['#00A850', '#4CAF50', '#FFD700', '#FF9800', '#8BC34A', '#CDDC39', '#fff', '#81C784'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.top = (40 + Math.random() * 30) + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (6 + Math.random() * 10) + 'px';
      piece.style.height = (6 + Math.random() * 10) + 'px';
      piece.style.animation = `confetti ${0.8 + Math.random() * 1.2}s ease forwards`;
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 2000);
    }, i * 25);
  }
}

// ==================== 初始化 ====================
buildGrid();
updateRemain();
updateRecords();
</script>
</body>
